name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Build app
        run: |
          xcodebuild \
            -project SleepASMR.xcodeproj \
            -scheme SleepASMR \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package app artifact
        run: |
          cd build/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent SleepASMR.app SleepASMR.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SleepASMR-macOS-app
          path: build/Build/Products/Release/SleepASMR.zip
          if-no-files-found: error
